services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      CONFIG_PATH: /root/config/config.yml
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_ADDRESS: ":8001"
    networks:
      - internal

  comm:
    build:
      context: .
      dockerfile: communication-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      CONFIG_PATH: /root/config/config.yml
      COMM_SERVICE_ADDRESS: ":8002"
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - internal
  
  gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    depends_on: [auth, comm]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      CONFIG_PATH: /root/config/config.yml
      JWT_SECRET: ${JWT_SECRET}
      API_GATEWAY_ADDRESS: ":8000"
      AUTH_SERVICE_URL: "http://auth:8001"
      COMM_SERVICE_URL: "http://comm:8002"
    networks:
      - internal
      - public
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on: [gateway]
    networks:
      - public
    ports:
      - "3000:80"

volumes:
  pgdata:

networks:
  internal:
  public:
